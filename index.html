<html>

<body style="background-color: black;">
    <canvas></canvas>
    <script>
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');

        canvas.height = 720;
        canvas.width = 1024;

        class Piece {

            style = {
                '0': { backColor: '#beac97', color: 'tranparent' },
                '2': { backColor: '#eee4da', color: '#756452' },
                '4': { backColor: '#ebd8b7', color: '#756452' },
                '8': { backColor: '#f2b177', color: 'white' },
                '16': { backColor: '#f29360', color: 'white' },
                '32': { backColor: '#f2914a', color: 'white' },
                '64': { backColor: '#f14b53', color: 'white' },
                '128': { backColor: '#f34978', color: 'white' },
                '256': { backColor: '#f04cb6', color: 'white' },
                '512': { backColor: '#e451eb', color: 'white' },
                '1024': { backColor: '#a24eee', color: 'white' },
                '2048': { backColor: '#7a4eee', color: 'white' },
                '4096': { backColor: '#4c4ff0', color: 'white' },
                '8192': { backColor: '#5180eb', color: 'white' },
                '16384': { backColor: '#59bee3', color: 'white' },
            }

            constructor(x, y, size, value) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.value = value;
            }

            draw() {
                const { backColor, color } = this.style[this.value];
                const font = this.value.toString().length > 3 ? '24' : '32';

                ctx.fillStyle = backColor
                ctx.beginPath()
                ctx.roundRect(this.x, this.y, this.size, this.size, 10);
                ctx.fill()

                ctx.fillStyle = color
                ctx.font = font + "px serif"
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillText(this.value,
                    this.x + (this.size / 2),
                    this.y + (this.size / 2),
                    this.size
                )
            }
        }

        class Board {
            constructor(x, y, size, count) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.count = count;

                this.board = [];
                const gap = (this.size * 0.1) / (this.count + 1);
                const pieceSize = ((this.size * 0.9) / this.count);
                for (let i = 0; i < this.count; i++) {
                    const row = []
                    for (let j = 0; j < this.count; j++) {
                        row.push(new Piece(
                            this.x + (gap * (j + 1)) + (pieceSize * j),
                            this.y + (gap * (i + 1)) + (pieceSize * i),
                            pieceSize,
                            0
                        ));
                    }
                    this.board.push(row)
                }

                this.createRandomPiece();
                this.createRandomPiece();
                this.createRandomPiece();
                this.createRandomPiece();
                this.createRandomPiece();
                this.createRandomPiece();
            }

            createRandomPiece() {
                if (this.board.some(row => row.some(p => p.value == 0))) {
                    const x = Math.floor(Math.random() * this.count)
                    const y = Math.floor(Math.random() * this.count)
                    if (this.board[x][y].value == 0) {
                        const value = Math.random() > 0.4 ? 2 : 4
                        this.board[x][y].value = value;
                    }
                    else
                        this.createRandomPiece()
                }
                else
                    this.endGame()
            }

            drawBoard() {
                ctx.fillStyle = '#9c8979'
                ctx.beginPath()
                ctx.roundRect(this.x, this.y, this.size, this.size, 10);
                ctx.fill()
            }

            draw() {
                this.drawBoard();
                for (let i = 0; i < this.count; i++)
                    for (let j = 0; j < this.count; j++)
                        this.board[i][j].draw()
            }

            move(touchStart, touchEnd) {
                const dx = touchEnd.pageX - touchStart.pageX
                const dy = touchEnd.pageY - touchStart.pageY
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0)
                        this.moveToRight()
                    else
                        this.moveToLeft()
                } else {
                    if (dy > 0)
                        this.moveToDown()
                    else
                        this.moveToUp()
                }
            }

            // sumArray(direction, pos) {
            //     let row = direction == 'r' ? pos : 0;
            //     let column = direction == 'c' ? pos : 0;
            //     const newArray = [];

            //     for (let i = 0; i < this.count; i++) {
            //         const piece = this.board[column][row];
            //         if (piece.value > 0)
            //             newArray.push(piece.value);

            //         if (direction == 'r')
            //             column++;
            //         else
            //             row++;
            //     }
            //     return newArray;
            // }

            moveToUp() {
                console.log('up')
            }
            moveToRight() {
                console.log('right')
            }
            moveToDown() {
                console.log('down')
            }

            moveToLeft() {
                const newMatrix = [];
                for (let i = 0; i < this.board.length; i++) {
                    const row = this.board[i];
                    const newArray = [];
                    for (let j = 0; j < row.length; j++) {
                        const piece = row[j];
                        if (piece.value > 0)
                            newArray.push(piece.value);
                    }
                    newMatrix.push(newArray);
                }

                const a = newMatrix
                
                // for (let i = 0; i < this.count; i++) {
                //     const a = this.sumArray('c', i);
                //     const x = a;
                // }

                this.draw();
            }

            endGame() {
                console.log('End Game !!!')
            }
        }

        class Game {
            constructor() {
                const sizeBoard = canvas.width / 3;
                this.board = new Board(
                    canvas.width / 2 - (sizeBoard / 2),
                    canvas.height / 2 - (sizeBoard / 2),
                    sizeBoard,
                    4
                )
                this.touchStart = null;
                this.initListeners()
            }

            getMousePosition(event) {
                return {
                    pageX: event.pageX,
                    pageY: event.pageY,
                };
            }

            initListeners() {
                canvas.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    this.touchStart = this.getMousePosition(event)
                })
                canvas.addEventListener('mouseup', (event) => {
                    event.preventDefault();
                    if (this.touchStart) {
                        this.board.move(this.touchStart, this.getMousePosition(event))
                        this.touchStart = null;
                    }
                })
            }

            drawBackground() {
                ctx.fillStyle = 'white'
                ctx.beginPath()
                ctx.roundRect(0, 0, canvas.width, canvas.height, 10);
                ctx.fill()
            }

            draw() {
                this.drawBackground();
                this.board.draw()
            }
        }

        const game = new Game();
        game.draw()

    </script>
</body>
