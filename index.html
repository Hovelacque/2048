<html>

<body style="background-color: black;">
    <canvas></canvas>
    <script>
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');

        canvas.height = 720;
        canvas.width = 1024;

        class Piece {

            style = {
                '-1': { backColor: '#beac97', color: 'tranparent' },
                '2': { backColor: '#eee4da', color: '#756452' },
                '4': { backColor: '#ebd8b7', color: '#756452' },
                '8': { backColor: '#f2b177', color: 'white' },
                '16': { backColor: '#f29360', color: 'white' },
                '32': { backColor: '#f2914a', color: 'white' },
                '64': { backColor: '#f14b53', color: 'white' },
                '128': { backColor: '#f34978', color: 'white' },
                '256': { backColor: '#f04cb6', color: 'white' },
                '512': { backColor: '#e451eb', color: 'white' },
                '1024': { backColor: '#a24eee', color: 'white' },
                '2048': { backColor: '#7a4eee', color: 'white' },
                '4096': { backColor: '#4c4ff0', color: 'white' },
                '8192': { backColor: '#5180eb', color: 'white' },
                '16384': { backColor: '#59bee3', color: 'white' },
            }

            constructor(x, y, size, value) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.value = value;
            }

            draw() {
                const { backColor, color } = this.style[this.value];
                const font = this.value.toString().length > 3 ? '24' : '32';

                ctx.fillStyle = backColor
                ctx.beginPath()
                ctx.roundRect(this.x, this.y, this.size, this.size, 10);
                ctx.fill()

                ctx.fillStyle = color
                ctx.font = font + "px serif"
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillText(this.value,
                    this.x + (this.size / 2),
                    this.y + (this.size / 2),
                    this.size
                )
            }
        }

        class Board {
            constructor(x, y, size, count) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.count = count;

                this.board = [];
                const gap = (this.size * 0.1) / (this.count + 1);
                const pieceSize = ((this.size * 0.9) / this.count);
                for (let i = 0; i < this.count; i++) {
                    const row = []
                    for (let j = 0; j < this.count; j++) {
                        row.push(new Piece(
                            this.x + (gap * (i + 1)) + (pieceSize * i),
                            this.y + (gap * (j + 1)) + (pieceSize * j),
                            pieceSize,
                            -1
                        ));
                    }
                    this.board.push(row)
                }

                this.board[0][0].value = 2
                this.board[0][1].value = 4
                this.board[0][2].value = 8
                this.board[0][3].value = 16
                this.board[1][0].value = 32
                this.board[1][1].value = 64
                this.board[1][2].value = 128
                this.board[1][3].value = 256
                this.board[2][0].value = 512
                this.board[2][1].value = 1024
                this.board[2][2].value = 2048
                this.board[2][3].value = 4096
                this.board[3][0].value = 8192
                this.board[3][1].value = 16384
            }

            drawBoard() {
                ctx.fillStyle = '#9c8979'
                ctx.beginPath()
                ctx.roundRect(this.x, this.y, this.size, this.size, 10);
                ctx.fill()
            }

            draw() {
                this.drawBoard();
                for (let i = 0; i < this.count; i++)
                    for (let j = 0; j < this.count; j++)
                        this.board[i][j].draw()
            }
        }

        class Game {
            constructor() {
                const sizeBoard = canvas.width / 3;
                this.board = new Board(
                    canvas.width / 2 - (sizeBoard / 2),
                    canvas.height / 2 - (sizeBoard / 2),
                    sizeBoard,
                    4
                )
            }

            drawBackground() {
                ctx.fillStyle = 'white'
                ctx.beginPath()
                ctx.roundRect(0, 0, canvas.width, canvas.height, 10);
                ctx.fill()
            }

            draw() {
                this.drawBackground();
                this.board.draw()
            }
        }

        const game = new Game();
        game.draw()

    </script>
</body>

</html>
